server {
    listen ${PORT};
    server_name _;

    # Resolver для динамического резолва хостов внутри Docker
    resolver 127.0.0.11 valid=10s;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing - все запросы, кроме /api/, идут на index.html
    location / {
        try_files $uri /index.html;
    }

    # API proxy (BFF) - проксируем на backend внутри docker-сети
    location /api/ {
        include /app/api-proxy.conf;
    }

    # Разрешаем большой payload только для конкретной ручки
    location = /api/tools/describe_element {
        client_max_body_size 50M;
        include /app/api-proxy.conf;
    }

    location = /api/tools/create_context_screenshot {
        client_max_body_size 50M;
        include /app/api-proxy.conf;
    }
}
